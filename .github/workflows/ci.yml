name: CI

on:
  pull_request:
    branches: [main, release/*]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      # TEST_DATABASE_URL will be wired by E3 later

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npx tsc --noEmit

      - run: npm test
        env:
          CI: true
